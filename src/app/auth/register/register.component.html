<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card shadow-sm">
      <div class="card-header bg-dark text-white text-center">
        <h4>Create an Account</h4>
      </div>

      <div class="card-body p-4">
        <form #regForm="ngForm" (ngSubmit)="onRegister(regForm)" novalidate>
          <div class="mb-3">
            <label class="form-label small fw-bold">Full Name</label>
            <input
              type="text"
              name="name"
              class="form-control"
              [(ngModel)]="model.name"
              required
              minlength="3"
              #name="ngModel"
            />

            <div
              *ngIf="name.invalid && (name.dirty || name.touched || submitted)"
              class="text-danger small mt-1"
            >
              <div *ngIf="name.errors?.['required']">Name is required.</div>
              <div *ngIf="name.errors?.['minlength']">
                Minimum 3 characters.
              </div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label small fw-bold">Email</label>
            <input
              type="email"
              name="email"
              class="form-control"
              [(ngModel)]="model.email"
              required
              email
              #email="ngModel"
            />

            <div
              *ngIf="
                email.invalid && (email.dirty || email.touched || submitted)
              "
              class="text-danger small mt-1"
            >
              <div *ngIf="email.errors?.['required']">Email is required.</div>
              <div *ngIf="email.errors?.['email']">Enter a valid email.</div>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label small fw-bold">Password</label>
            <input
              type="password"
              name="password"
              class="form-control"
              [(ngModel)]="model.password"
              required
              minlength="6"
              #password="ngModel"
            />

            <div
              *ngIf="
                password.invalid &&
                (password.dirty || password.touched || submitted)
              "
              class="text-danger small mt-1"
            >
              <div *ngIf="password.errors?.['required']">
                Password is required.
              </div>
              <div *ngIf="password.errors?.['minlength']">
                Minimum 6 characters.
              </div>
            </div>
          </div>

          <div class="form-check mb-4">
            <input
              type="checkbox"
              name="agree"
              class="form-check-input"
              [(ngModel)]="model.agree"
              required
              #agree="ngModel"
            />
            <label class="form-check-label small fw-bold">
              I agree to the Terms & Conditions
            </label>

            <div
              *ngIf="agree.invalid && submitted"
              class="text-danger small mt-1"
            >
              You must agree before registering.
            </div>
          </div>

          <button
            class="btn btn-primary w-100 py-2"
            [disabled]="regForm.invalid"
          >
            Register
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
