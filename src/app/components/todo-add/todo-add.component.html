<h3>Add Todo</h3>

<form [formGroup]="form" (ngSubmit)="submit()" class="mt-3">
  <div class="mb-3">
    <label class="form-label">Title</label>
    <input
      type="text"
      class="form-control"
      formControlName="title"
      placeholder="Enter title"
    />

    <div
      *ngIf="form.controls['title'].invalid && form.controls['title'].touched"
      class="text-danger mt-1"
    >
      <small *ngIf="form.controls['title'].errors?.['required']"
        >Title is required.</small
      >
      <small *ngIf="form.controls['title'].errors?.['minlength']"
        >Minimum 3 characters.</small
      >
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Description</label>
    <textarea
      class="form-control"
      formControlName="description"
      rows="3"
      placeholder="Enter description"
    ></textarea>
  </div>

  <div class="form-check mb-3">
    <input
      type="checkbox"
      class="form-check-input"
      formControlName="completed"
    />
    <label class="form-check-label">Completed</label>
  </div>

  <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
    Add Todo
  </button>
</form>
